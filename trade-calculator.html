        font-weight: 800;
        text-decoration: underline;
        text-decoration-thickness: 2px;

      .meta {

        padding: 16px;
      }

      .grid {

        grid-template-columns: 1fr 120px 1fr;
        gap: 12px;

        letter-spacing: 0.2px;
      }

        gap: 12px;
        justify-items: center;
        padding-top: 12px;

        background: var(--panel-2);
        border: 1px solid var(--border);

      .btn {

        background: rgba(255, 255, 255, 0.62);
        color: var(--text);

        padding: 10px 12px;
        font-weight: 600;

      <section class="grid">
        <div class="card" id="leftCard">
          <div class="card-head">
            <h2>Your Offer</h2>
            <button class="btn ghost" id="clearLeft" type="button">Clear</button>
          </div>

          <div class="add">
            <label class="label" for="searchLeft">Add item</label>
            <input class="input" id="searchLeft" placeholder="Search items…" autocomplete="off" spellcheck="false" />
            <div class="suggestions" id="suggestionsLeft" hidden></div>
          </div>

          <div class="list" id="listLeft"></div>
          <div class="totals" id="totalsLeft"></div>
        </div>

        <div class="mid">

          <button class="btn" id="resetAll" type="button">Reset</button>

        <div class="card" id="rightCard">

            <h2>Their Offer</h2>
            <button class="btn ghost" id="clearRight" type="button">Clear</button>
          </div>

          <div class="add">
            <label class="label" for="searchRight">Add item</label>
            <input class="input" id="searchRight" placeholder="Search items…" autocomplete="off" spellcheck="false" />
            <div class="suggestions" id="suggestionsRight" hidden></div>
          </div>

          <div class="list" id="listRight"></div>
          <div class="totals" id="totalsRight"></div>
        </div>
      </section>

      <section class="summary card" aria-live="polite">
        <div class="card-head">
          <h2>Difference</h2>
          <div class="pill diff-neutral" id="diffPill">—</div>
        </div>
        <div class="summary-grid">
          <div class="summary-row">
            <div class="k">Your total</div>
            <div class="v" id="sumLeft">—</div>
          </div>
          <div class="summary-row">
            <div class="k">Their total</div>
            <div class="v" id="sumRight">—</div>
          </div>
          <div class="summary-row">
            <div class="k">Their − Yours</div>
            <div class="v strong" id="sumDiff">—</div>
          </div>
        </div>
        <div class="note" id="note"></div>
      </section>
    </main>

      }
      
      function compareStrings(a, b) {
        return a.localeCompare(b, undefined, { sensitivity: "base" });
      }
      
      function buildIndex(items) {
        return items.map((item) => ({
          item,
          key: `${safeText(item.name)} ${safeText(item.category)} ${safeText(item.group)}`.toLowerCase(),
        }));
      }
      
      function getItemLabel(item) {
        const parts = [];
        if (item.category) parts.push(item.category);
        if (item.group && item.group !== item.name) parts.push(item.group);
        return parts.join(" · ");
      }
      
      function computeOfferTotals(entries, itemsById, conversions) {
        let keys = 0;
        let gems = 0;
        let goldMin = 0;
        let goldMax = 0;
        let skipped = 0;
      
        for (const entry of entries) {
          const item = itemsById.get(entry.id);
          if (!item) continue;
          const qty = Math.max(1, Number(entry.qty || 1));
      
          if (isNumber(item.valueKeys)) keys += item.valueKeys * qty;
          else skipped += qty;
      
          if (isNumber(item.taxGems)) gems += item.taxGems * qty;
      
          if (isNumber(item.taxGoldMin)) goldMin += item.taxGoldMin * qty;
          if (isNumber(item.taxGoldMax)) goldMax += item.taxGoldMax * qty;
          else if (isNumber(item.taxGoldMin)) goldMax += item.taxGoldMin * qty;
        }
      
        const viz = isNumber(keys) ? keys / conversions.keysPerViz : null;
        const scroll = isNumber(keys) ? keys / conversions.keysPerScroll : null;
      
        return { keys, viz, scroll, gems, goldMin, goldMax, skipped };
      }
      
      function saveState(state) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        } catch {
          /* ignore */
        }
      }
      
      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") return null;
          if (!Array.isArray(parsed.left) || !Array.isArray(parsed.right)) return null;
          const unit = parsed.unit === "viz" ? "viz" : "keys";
          return { left: parsed.left, right: parsed.right, unit };
        } catch {
          return null;
        }
      }
      
      function uniqueAppend(entries, id) {
        const existing = entries.find((e) => e.id === id);
        if (existing) {
          existing.qty = Math.min(999, Math.max(1, Number(existing.qty || 1) + 1));
          return;
        }
        entries.unshift({ id, qty: 1 });
      }
      
      function renderOffer({ listEl, totalsEl, entries, itemsById, conversions, onRemove, onQty }) {
        listEl.innerHTML = "";
      
        if (entries.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "No items yet. Search above to add.";
          listEl.appendChild(empty);
        } else {
          for (const entry of entries) {
            const item = itemsById.get(entry.id);
            if (!item) continue;
            const row = document.createElement("div");
            row.className = "row";
      
            const left = document.createElement("div");
            left.className = "r-main";
            const name = document.createElement("div");
            name.className = "r-name";
            name.textContent = item.name;
            const meta = document.createElement("div");
            meta.className = "r-meta";
      
            const label = getItemLabel(item);
            if (label) {
              const span = document.createElement("span");
              span.textContent = label;
              meta.appendChild(span);
            }
      
            const span = document.createElement("span");
            if (item.valueKind === "numeric" && isNumber(item.valueKeys)) {
              span.textContent = `Value: ${formatValueWithUnit(item.valueKeys, window.__PERFEKT_UNIT || "keys", conversions, true)}`;
            } else if (item.valueKind === "owner_choice") {
              span.textContent = "Value: O/C";
            } else if (item.valueKind === "not_available") {
              span.textContent = "Value: N/A";
            } else if (item.valueRaw) {
              span.textContent = `Value: ${item.valueRaw}`;
            } else {
              span.textContent = "Value: —";
            }
            meta.appendChild(span);
      
            left.appendChild(name);
            left.appendChild(meta);
      
            const qty = document.createElement("input");
            qty.className = "qty";
            qty.type = "number";
            qty.min = "1";
            qty.max = "999";
            qty.value = String(entry.qty || 1);
            qty.addEventListener("input", () => onQty(entry.id, qty.value));
      
            const remove = document.createElement("button");
            remove.className = "icon-btn";
            remove.type = "button";
            remove.title = "Remove";
            remove.textContent = "×";
            remove.addEventListener("click", () => onRemove(entry.id));
      
            row.appendChild(left);
            row.appendChild(qty);
            row.appendChild(remove);
            listEl.appendChild(row);
          }
        }
      
        const totals = computeOfferTotals(entries, itemsById, conversions);
        totalsEl.innerHTML = "";
        totalsEl.appendChild(
          makeTotalRow(`Total value (${unitLabel(window.__PERFEKT_UNIT || "keys")})`, formatValueWithUnit(totals.keys, window.__PERFEKT_UNIT || "keys", conversions, false))
        );
        totalsEl.appendChild(makeTotalRow("Gem tax", isNumber(totals.gems) && totals.gems > 0 ? formatNumber(totals.gems) : "—"));
      
        const goldText =
          isNumber(totals.goldMin) && isNumber(totals.goldMax) && totals.goldMax > 0
            ? totals.goldMin === totals.goldMax
              ? formatNumber(totals.goldMin)
              : `${formatNumber(totals.goldMin)} – ${formatNumber(totals.goldMax)}`
            : "—";
        totalsEl.appendChild(makeTotalRow("Gold tax", goldText));
      }
      
      function makeTotalRow(label, value) {
        const row = document.createElement("div");
        row.className = "t-row";
      
        const k = document.createElement("div");
        k.className = "k";
        k.textContent = label;
      
        const v = document.createElement("div");
        v.className = "v";
        v.textContent = value;
      
        row.appendChild(k);
        row.appendChild(v);
        return row;
      }
      
      function renderDiff({ diffPillEl, sumLeftEl, sumRightEl, sumDiffEl, noteEl, leftTotals, rightTotals }) {
        const unit = window.__PERFEKT_UNIT || "keys";
        sumLeftEl.textContent = formatValueWithUnit(leftTotals.keys, unit, window.__PERFEKT_CONVERSIONS, false);
        sumRightEl.textContent = formatValueWithUnit(rightTotals.keys, unit, window.__PERFEKT_CONVERSIONS, false);
      
        const diffKeys = rightTotals.keys - leftTotals.keys;
        const diff = valueInUnit(diffKeys, unit, window.__PERFEKT_CONVERSIONS);
        const diffText = `${diff >= 0 ? "+" : ""}${formatNumber(diff)} ${unit === "viz" ? "viz" : "keys"}`;
        sumDiffEl.textContent = diffText;
      
        diffPillEl.textContent = diffText;
        diffPillEl.classList.remove("diff-neutral", "diff-good", "diff-bad");
        diffPillEl.classList.add(diff === 0 ? "diff-neutral" : diff > 0 ? "diff-good" : "diff-bad");
      
        const notes = [];
        if (leftTotals.skipped > 0) notes.push(`Left side: ${leftTotals.skipped} item(s) not counted (O/C or N/A).`);
        if (rightTotals.skipped > 0) notes.push(`Right side: ${rightTotals.skipped} item(s) not counted (O/C or N/A).`);
        noteEl.textContent = notes.join(" ");
      }
      
      function setupSearch({ inputEl, suggestionsEl, index, onPick, getUnit, conversions }) {
        function close() {
          suggestionsEl.hidden = true;
          suggestionsEl.innerHTML = "";
        }
      
        function open(results) {
          suggestionsEl.hidden = false;
          suggestionsEl.innerHTML = "";
      
          for (const { item } of results) {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "s-item";
      
            const title = document.createElement("div");
            title.className = "s-title";
            title.textContent = item.name;
      
            const sub = document.createElement("div");
            sub.className = "s-sub";
            const label = getItemLabel(item);
            if (label) sub.appendChild(Object.assign(document.createElement("span"), { textContent: label }));
            const unit = getUnit();
            if (item.valueKind === "numeric" && isNumber(item.valueKeys)) {
              sub.appendChild(
                Object.assign(document.createElement("span"), {
                  textContent: formatValueWithUnit(item.valueKeys, unit, conversions, true),
                })
              );
            } else if (item.valueKind === "owner_choice") {
              sub.appendChild(Object.assign(document.createElement("span"), { textContent: "O/C" }));
            } else if (item.valueKind === "not_available") {
              sub.appendChild(Object.assign(document.createElement("span"), { textContent: "N/A" }));
            } else if (item.valueRaw) {
              sub.appendChild(Object.assign(document.createElement("span"), { textContent: item.valueRaw }));
            }
      
            btn.appendChild(title);
            btn.appendChild(sub);
            btn.addEventListener("click", () => {
              onPick(item.id);
              inputEl.value = "";
              close();
              inputEl.focus();
            });
            suggestionsEl.appendChild(btn);
          }
        }
      
        function search() {
          const q = normalizeQuery(inputEl.value);
          if (!q) return close();
          const results = [];
          for (const x of index) {
            if (x.key.includes(q)) results.push(x);
            if (results.length >= 25) break;
          }
          results.sort((a, b) => compareStrings(a.item.name, b.item.name));
          if (results.length === 0) return close();
          open(results);
        }
      
        inputEl.addEventListener("input", search);
        inputEl.addEventListener("blur", () => setTimeout(close, 160));
        inputEl.addEventListener("keydown", (e) => {
          if (e.key === "Escape") {
            close();
            inputEl.blur();
            return;
          }
          if (e.key === "Enter") {
            const first = suggestionsEl.querySelector(".s-item");
            if (first) {
              first.click();
              e.preventDefault();
            }
          }
        });
      }
      
      async function main() {
        let data = loadData();
        if (!data) {
          try {
            const resp = await fetch("values.json", { cache: "no-store" });
            if (resp.ok) data = await resp.json();
          } catch {
            data = null;
          }
        }
      
        if (!data || !Array.isArray(data.items)) {
          document.getElementById("meta").textContent = "Could not load values.";
          return;
        }
      
        const conversions = data.meta?.conversions || { keysPerViz: 900, keysPerScroll: 3 };
        window.__PERFEKT_CONVERSIONS = conversions;
        const itemsById = new Map(data.items.map((i) => [i.id, i]));
        const index = buildIndex(data.items);
      
        const metaEl = document.getElementById("meta");
        const generatedAt = parseGeneratedAt(data.meta?.generatedAt);
        metaEl.textContent = generatedAt ? `Last generated: ${formatDateTime(generatedAt)}` : "";
      
        const elements = {
          left: {
            listEl: document.getElementById("listLeft"),
            totalsEl: document.getElementById("totalsLeft"),
            inputEl: document.getElementById("searchLeft"),
            suggestionsEl: document.getElementById("suggestionsLeft"),
            clearBtn: document.getElementById("clearLeft"),
          },
          right: {
            listEl: document.getElementById("listRight"),
            totalsEl: document.getElementById("totalsRight"),
            inputEl: document.getElementById("searchRight"),
            suggestionsEl: document.getElementById("suggestionsRight"),
            clearBtn: document.getElementById("clearRight"),
          },
          resetBtn: document.getElementById("resetAll"),
          diffPillEl: document.getElementById("diffPill"),
          sumLeftEl: document.getElementById("sumLeft"),
          sumRightEl: document.getElementById("sumRight"),
          sumDiffEl: document.getElementById("sumDiff"),
          noteEl: document.getElementById("note"),
          unitKeysBtn: document.getElementById("unitKeys"),
          unitVizBtn: document.getElementById("unitViz"),
        };
      
        const loaded = loadState();
        const state = {
          left: Array.isArray(loaded?.left) ? loaded.left : [],
          right: Array.isArray(loaded?.right) ? loaded.right : [],
          unit: loaded?.unit === "viz" ? "viz" : "keys",
        };
      
        function sanitizeSide(side) {
          side.splice(
            0,
            side.length,
            ...side.filter((e) => e && typeof e.id === "string" && itemsById.has(e.id)).map((e) => ({ id: e.id, qty: Math.max(1, Number(e.qty || 1)) }))
          );
        }
      
        sanitizeSide(state.left);
        sanitizeSide(state.right);
      
        function render() {
          window.__PERFEKT_UNIT = state.unit;
          const leftTotals = computeOfferTotals(state.left, itemsById, conversions);
          const rightTotals = computeOfferTotals(state.right, itemsById, conversions);
      
          renderOffer({
            listEl: elements.left.listEl,
            totalsEl: elements.left.totalsEl,
            entries: state.left,
            itemsById,
            conversions,
            onRemove: (id) => {
              state.left = state.left.filter((e) => e.id !== id);
              saveState(state);
              render();
            },
            onQty: (id, qty) => {
              const entry = state.left.find((e) => e.id === id);
              if (!entry) return;
              entry.qty = Math.max(1, Math.min(999, Number(qty || 1)));
              saveState(state);
              render();
            },
          });
      
          renderOffer({
            listEl: elements.right.listEl,
            totalsEl: elements.right.totalsEl,
            entries: state.right,
            itemsById,
            conversions,
            onRemove: (id) => {
              state.right = state.right.filter((e) => e.id !== id);
              saveState(state);
              render();
            },
            onQty: (id, qty) => {
              const entry = state.right.find((e) => e.id === id);
              if (!entry) return;
              entry.qty = Math.max(1, Math.min(999, Number(qty || 1)));
              saveState(state);
              render();
            },
          });
      
          renderDiff({
            diffPillEl: elements.diffPillEl,
            sumLeftEl: elements.sumLeftEl,
            sumRightEl: elements.sumRightEl,
            sumDiffEl: elements.sumDiffEl,
            noteEl: elements.noteEl,
            leftTotals,
            rightTotals,
          });
        }
      
        setupSearch({
          inputEl: elements.left.inputEl,
          suggestionsEl: elements.left.suggestionsEl,
          index,
          conversions,
          getUnit: () => state.unit,
          onPick: (id) => {
            uniqueAppend(state.left, id);
            saveState(state);
            render();
          },
        });
      
        setupSearch({
          inputEl: elements.right.inputEl,
          suggestionsEl: elements.right.suggestionsEl,
          index,
          conversions,
          getUnit: () => state.unit,
          onPick: (id) => {
            uniqueAppend(state.right, id);
            saveState(state);
            render();
          },
        });
      
        function applyUnitUi() {
          elements.unitKeysBtn.classList.toggle("active", state.unit === "keys");
          elements.unitVizBtn.classList.toggle("active", state.unit === "viz");
        }
      
        elements.unitKeysBtn.addEventListener("click", () => {
          state.unit = "keys";
          applyUnitUi();
          saveState(state);
          render();
        });
        elements.unitVizBtn.addEventListener("click", () => {
          state.unit = "viz";
          applyUnitUi();
          saveState(state);
          render();
        });
      
        elements.left.clearBtn.addEventListener("click", () => {
          state.left = [];
          saveState(state);
          render();
        });
        elements.right.clearBtn.addEventListener("click", () => {
          state.right = [];
          saveState(state);
          render();
        });
        elements.resetBtn.addEventListener("click", () => {
          state.left = [];
          state.right = [];
          saveState(state);
          render();
        });
      
        applyUnitUi();
        render();
      }
      
      main();
    </script>
  </body>
</html>
